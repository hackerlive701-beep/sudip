<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0D0C0A;color:#F5EFE6;min-height:100vh}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#2C2822;border-radius:3px}
input,select,button{font-family:inherit}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 20px;border-radius:10px;border:none;cursor:pointer;font-weight:600;font-size:14px;transition:all .18s ease}
.btn-primary{background:#FF6B35;color:#fff}.btn-primary:hover{background:#FF8555;transform:translateY(-1px)}
.btn-ghost{background:transparent;color:#FF6B35;border:1px solid rgba(255,107,53,0.3)}.btn-ghost:hover{background:rgba(255,107,53,0.12)}
.btn-sec{background:#1E1B17;color:#F5EFE6;border:1px solid #2C2822}.btn-sec:hover{background:#252117}
.card{background:#1E1B17;border:1px solid #2C2822;border-radius:16px;transition:all .2s ease}
.card-hover:hover{background:#252117;transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.2);cursor:pointer}
.food-emoji{transition:transform .22s ease}
.card-hover:hover .food-emoji{transform:scale(1.12) rotate(-3deg)}
.tag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:.04em;text-transform:uppercase}
.tag-accent{background:rgba(255,107,53,0.15);color:#FF6B35}
.tag-warn{background:rgba(251,191,36,0.15);color:#FBBF24}
.tag-success{background:rgba(74,222,128,0.12);color:#4ADE80}
.tag-info{background:rgba(96,165,250,0.12);color:#60A5FA}
.nav-link{padding:7px 15px;background:transparent;border:none;border-radius:8px;font-size:14px;font-weight:500;color:#9B9188;cursor:pointer;transition:all .15s}
.nav-link:hover,.nav-link.active{background:rgba(255,107,53,0.15);color:#FF6B35}
.icon-btn{width:36px;height:36px;border-radius:10px;background:#1E1B17;border:1px solid #2C2822;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.icon-btn:hover{background:#252117;border-color:#3C3830}
input[type=text],input[type=email],input[type=password],input[type=number],select{width:100%;padding:11px 14px;background:#1A1714;border:1px solid #2C2822;border-radius:10px;color:#F5EFE6;font-size:14px;outline:none;transition:border-color .15s}
input:focus,select:focus{border-color:#FF6B35}
input[type=range]{accent-color:#FF6B35;width:100%}
.divider{height:1px;background:#2C2822;margin:16px 0}
.section-title{font-size:22px;font-weight:800;color:#F5EFE6;letter-spacing:-.02em;margin-bottom:20px}
.toast{position:fixed;top:72px;right:16px;z-index:999;background:#1E1B17;border:1px solid #4ADE80;border-radius:12px;padding:12px 18px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 30px rgba(0,0,0,.3);animation:slideIn .3s ease;font-size:14px;font-weight:500;color:#F5EFE6}
.grid-food{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:18px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.step-dot{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;transition:all .3s;flex-shrink:0}
select option{background:#1E1B17}

function $$(sel){return document.querySelectorAll(sel)}
function $(sel){return document.querySelector(sel)}
function cartTotal(){return state.cart.reduce((s,i)=>s+i.price*i.qty,0)}
function cartCount(){return state.cart.reduce((s,i)=>s+i.qty,0)}
function stars(r){return '★'.repeat(Math.floor(r))+'☆'.repeat(5-Math.floor(r))}
function showToast(msg,type='ok'){
  if(state.toastTimer)clearTimeout(state.toastTimer);
  state.toast={msg,type};
  const t=$('#toast');
  if(t){t.innerHTML=`<span>${type==='ok'?'✅':'❌'}</span><span>${msg}</span>`;t.style.display='flex';t.style.borderColor=type==='ok'?C.ok:C.err;}
  state.toastTimer=setTimeout(()=>{const t=$('#toast');if(t)t.style.display='none';},3000);
}
function addToCart(item,opts={}){
  const key=`${item.id}-${opts.size||''}-${(opts.tops||[]).join(',')}`;
  const topPrice=(opts.tops||[]).reduce((s,t)=>s+parseFloat(t.split('+')[1]||0),0);
  const price=item.price+topPrice;
  const idx=state.cart.findIndex(i=>i.key===key);
  if(idx>=0){state.cart[idx].qty++;}
  else{state.cart.push({...item,key,qty:1,price,selectedSize:opts.size||item.sizes?.[0],selectedTops:opts.tops||[]});}
  showToast(`${item.name} added to cart!`);
  updateCartBadge();
}
function updateCartBadge(){
  const b=$('#cart-badge');
  if(b){const n=cartCount();b.textContent=n;b.style.display=n>0?'flex':'none';}
}
function navigate(page,extra={}){
  state.prevPage=state.page;
  state.page=page;
  if(extra.item)state.selItem=extra.item;
  render();
  window.scrollTo(0,0);
}
function themeCSS(){

function renderMenu(){
  let cat=state.menuCat||'all', search=state.menuSearch||'', sort=state.menuSort||'popular', maxPrice=state.menuPrice||50, pg=state.menuPage||1;
  const PER=8;
  let items=ITEMS.filter(i=>{
    if(cat!=='all'&&i.cat!==cat)return false;
    if(search&&!i.name.toLowerCase().includes(search.toLowerCase()))return false;
    if(i.price>maxPrice)return false;
    return true;
  });
  if(sort==='rating')items.sort((a,b)=>b.rating-a.rating);
  else if(sort==='price-asc')items.sort((a,b)=>a.price-b.price);
  else if(sort==='price-desc')items.sort((a,b)=>b.price-a.price);
  else items.sort((a,b)=>b.reviews-a.reviews);
  const total=Math.ceil(items.length/PER);
  const paged=items.slice((pg-1)*PER,pg*PER);

  return `<div style="padding-top:68px;padding-bottom:64px">
    <div style="max-width:1100px;margin:0 auto;padding:0 20px">
      <h1 style="font-size:28px;font-weight:900;color:${C.txt};letter-spacing:-.03em;margin-bottom:4px">Our Menu</h1>
      <p style="font-size:14px;color:${C.mut};margin-bottom:28px">${items.length} dishes available</p>
      <div style="display:grid;grid-template-columns:210px 1fr;gap:28px">
        <!-- SIDEBAR -->
        <aside style="position:sticky;top:68px;height:fit-content">
          <div class="card" style="padding:18px">
            <div style="font-size:12px;font-weight:700;color:${C.mut};letter-spacing:.08em;text-transform:uppercase;margin-bottom:14px">Filters</div>
            <div style="margin-bottom:18px">
              <div style="font-size:11px;font-weight:700;color:${C.sub};text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Category</div>
              ${CATS.map(c=>`<button onclick="state.menuCat='${c.id}';state.menuPage=1;render()" style="display:flex;align-items:center;gap:7px;width:100%;padding:7px 10px;background:${(state.menuCat||'all')===c.id?C.accDim:'transparent'};border:none;border-radius:7px;font-size:13px;color:${(state.menuCat||'all')===c.id?C.acc:C.mut};cursor:pointer;text-align:left;font-weight:${(state.menuCat||'all')===c.id?'700':'400'};margin-bottom:1px">${c.icon} ${c.label}<span style="margin-left:auto;font-size:11px;background:${C.badge};padding:2px 6px;border-radius:8px;color:${C.badgeTxt}">${c.id==='all'?ITEMS.length:ITEMS.filter(i=>i.cat===c.id).length}</span></button>`).join('')}
            </div>
            <div class="divider"></div>
            <div style="margin-bottom:18px">
              <div style="font-size:11px;font-weight:700;color:${C.sub};text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Max Price: <span style="color:${C.acc}">$${maxPrice}</span></div>
              <input type="range" min="5" max="50" value="${maxPrice}" oninput="state.menuPrice=+this.value;state.menuPage=1;render()">
            </div>
            <div class="divider"></div>
            <div style="margin-bottom:18px">
              <div style="font-size:11px;font-weight:700;color:${C.sub};text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Sort By</div>
              ${[['popular','Most Popular'],['rating','Highest Rated'],['price-asc','Price: Low→High'],['price-desc','Price: High→Low']].map(([v,l])=>`<button onclick="state.menuSort='${v}';state.menuPage=1;render()" style="display:block;width:100%;padding:7px 10px;background:${(state.menuSort||'popular')===v?C.accDim:'transparent'};border:none;border-radius:7px;font-size:13px;color:${(state.menuSort||'popular')===v?C.acc:C.mut};cursor:pointer;text-align:left;font-weight:${(state.menuSort||'popular')===v?'700':'400'};margin-bottom:1px">${l}</button>`).join('')}
            </div>
            <div class="divider"></div>
            <button onclick="state.menuCat='all';state.menuSearch='';state.menuSort='popular';state.menuPrice=50;state.menuPage=1;render()" class="btn btn-ghost" style="width:100%;font-size:13px;border-radius:8px">↺ Reset</button>
          </div>
        </aside>
        <!-- MAIN -->
        <div>
          <div style="position:relative;margin-bottom:20px">
            <span style="position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:17px">🔍</span>
            <input type="text" value="${search}" oninput="state.menuSearch=this.value;state.menuPage=1;render()" placeholder="Search dishes, ingredients..." style="padding:12px 14px 12px 40px;font-size:14px;border-radius:12px">
          </div>
          ${paged.length===0?`<div style="text-align:center;padding:72px 20px"><div style="font-size:48px;margin-bottom:14px">🍽️</div><div style="font-size:18px;font-weight:700;color:${C.txt};margin-bottom:8px">No dishes found</div><div style="font-size:14px;color:${C.mut}">Try adjusting your search or filters</div></div>`:`<div class="grid-food">${paged.map(i=>renderFoodCard(i)).join('')}</div>`}
          ${total>1?`<div style="display:flex;justify-content:center;gap:8px;margin-top:32px">
            <button class="btn btn-sec" onclick="state.menuPage=Math.max(1,state.menuPage-1);render()" ${(state.menuPage||1)===1?'disabled':''} style="font-size:13px;padding:8px 14px">← Prev</button>
            ${Array.from({length:total},(_,i)=>i+1).map(n=>`<button onclick="state.menuPage=${n};render()" style="width:34px;height:34px;border-radius:8px;border:1px solid ${n===(state.menuPage||1)?C.acc:C.brd};background:${n===(state.menuPage||1)?C.acc:C.bgCard};color:${n===(state.menuPage||1)?'#fff':C.mut};cursor:pointer;font-size:13px;font-weight:600">${n}</button>`).join('')}
            <button class="btn btn-sec" onclick="state.menuPage=Math.min(${total},state.menuPage+1);render()" ${(state.menuPage||1)===total?'disabled':''} style="font-size:13px;padding:8px 14px">Next →</button>
          </div>`:''}
        </div>
      </div>
    </div>
  </div>`;
}

  const delFee=cartTotal()>40?0:3.99;
  const tax=(cartTotal()-disc)*0.08;
  const final=cartTotal()-disc+delFee+tax;
  const couponInput=state.cartCoupon||'';

  return `<div style="padding-top:68px;padding-bottom:64px">
    <div style="max-width:960px;margin:0 auto;padding:0 20px">
      <h1 style="font-size:28px;font-weight:900;color:${C.txt};letter-spacing:-.03em;margin-bottom:28px">Your Cart</h1>
      ${state.cart.length===0?`<div style="text-align:center;padding:72px 20px"><div style="font-size:64px;margin-bottom:18px">🛒</div><div style="font-size:20px;font-weight:700;color:${C.txt};margin-bottom:8px">Your cart is empty</div><div style="font-size:14px;color:${C.mut};margin-bottom:28px">Add some delicious items from our menu</div><button class="btn btn-primary" onclick="navigate('menu')" style="border-radius:12px;padding:13px 28px;font-size:15px">Browse Menu</button></div>`:`

          ${state.cart.map((item,idx)=>`<div class="card" style="padding:16px;display:flex;gap:14px;align-items:center">
            <div style="width:66px;height:66px;background:${C.accDim};border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:34px;flex-shrink:0">${item.img}</div>
            <div style="flex:1;min-width:0">
              <div style="font-size:15px;font-weight:700;color:${C.txt};margin-bottom:3px">${item.name}</div>
              <div style="font-size:12px;color:${C.mut};margin-bottom:4px">${item.selectedSize||''}${item.selectedTops?.length?' · '+item.selectedTops.length+' extras':''}</div>

            <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
              <button onclick="updateQty(${idx},-1);render()" style="width:28px;height:28px;border-radius:7px;background:${C.bgIn};border:1px solid ${C.brd};color:${C.txt};font-size:16px;cursor:pointer">−</button>
              <span style="font-size:14px;font-weight:700;color:${C.txt};min-width:18px;text-align:center">${item.qty}</span>
              <button onclick="updateQty(${idx},1);render()" style="width:28px;height:28px;border-radius:7px;background:${C.acc};border:none;color:#fff;font-size:16px;cursor:pointer">+</button>
              <button onclick="state.cart.splice(${idx},1);showToast('Item removed');render()" style="width:28px;height:28px;border-radius:7px;background:${C.errDim};border:none;color:${C.err};font-size:13px;cursor:pointer;margin-left:4px">✕</button>
            </div>
          </div>`).join('')}
          <!-- Coupon -->
          <div class="card" style="padding:16px">
            <div style="font-size:14px;font-weight:700;color:${C.txt};margin-bottom:10px">🎟️ Coupon Code</div>
            <div style="display:flex;gap:10px">
              <input type="text" value="${state.cartCoupon||''}" oninput="state.cartCoupon=this.value" placeholder="Enter code..." ${state.coupon?'disabled':''} style="flex:1;padding:10px 14px">
              ${state.coupon?`<button onclick="state.coupon=null;state.cartCoupon='';render()" style="padding:10px 14px;background:${C.errDim};border:none;border-radius:10px;color:${C.err};cursor:pointer;font-size:13px;font-weight:600">Remove</button>`:`<button onclick="applyCoupon();render()" class="btn btn-primary" style="padding:10px 16px;font-size:13px;border-radius:10px">Apply</button>`}
            </div>
            ${state.coupon?`<div style="font-size:13px;color:${C.ok};margin-top:8px">✅ ${state.coupon.code} — ${state.coupon.pct}% off!</div>`:''}
            <div style="font-size:11px;color:${C.mut};margin-top:8px">Try: FEAST20 · WELCOME15 · NEWUSER</div>
          </div>
        </div>
        <!-- SUMMARY -->
        <div class="card" style="padding:20px;position:sticky;top:68px">

            ${['💳','🔒','🛡️'].map(i=>`<span style="font-size:18px;opacity:.5">${i}</span>`).join('')}
          </div>
          <div style="font-size:11px;color:${C.sub};text-align:center;margin-top:4px">Secure · SSL encrypted</div>
        </div>
      </div>`}
    </div>
  </div>`;
}

function renderCheckout(){
  const step=state.checkoutStep||1;
  const delFee=state.delivery==='express'?8.99:state.delivery==='priority'?5.99:3.99;
  const tax=cartTotal()*0.08;
  const final=cartTotal()+delFee+tax;
  const addr=state.addr||{name:'Alex Chen',phone:'+1 (555) 000-1234',line1:'123 Gourmet Ave',city:'New York',zip:'10001'};

  return `<div style="padding-top:68px;padding-bottom:64px">
    <div style="max-width:860px;margin:0 auto;padding:0 20px">
      <h1 style="font-size:26px;font-weight:900;color:${C.txt};letter-spacing:-.03em;margin-bottom:28px">Checkout</h1>
      <!-- Steps -->
      <div style="display:flex;align-items:center;margin-bottom:36px">
        ${[['1','Address'],['2','Delivery'],['3','Payment']].map(([n,l],i,arr)=>`
          <div style="display:flex;flex-direction:column;align-items:center;gap:5px">
            <div class="step-dot" style="background:${step>=+n?C.acc:C.bgCard};border:2px solid ${step>=+n?C.acc:C.brd};color:${step>=+n?'#fff':C.mut}">${step>+n?'✓':n}</div>
            <span style="font-size:11px;font-weight:600;color:${step>=+n?C.acc:C.mut}">${l}</span>
          </div>
          ${i<arr.length-1?`<div style="flex:1;height:2px;background:${step>+n?C.acc:C.brd};margin:0 10px;margin-bottom:18px;transition:background .3s"></div>`:''}`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:1fr 270px;gap:24px;align-items:start">
        <div>
          ${step===1?`<div class="card" style="padding:26px">
            <div style="font-size:17px;font-weight:800;color:${C.txt};margin-bottom:22px">📍 Delivery Address</div>
            <div class="grid-2">
              <div><label style="font-size:11px;font-weight:700;color:${C.mut};text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:5px">Full Name</label><input type="text" value="${addr.name}" oninput="state.addr={...state.addr||{},name:this.value}"></div>
              <div><label style="font-size:11px;font-weight:700;color:${C.mut};text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:5px">Phone</label><input type="text" value="${addr.phone||''}" oninput="state.addr={...state.addr||{},phone:this.value}"></div>
            </div>
            <div style="margin-top:14px"><label style="font-size:11px;font-weight:700;color:${C.mut};text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:5px">Street Address</label><input type="text" value="${addr.line1}" oninput="state.addr={...state.addr||{},line1:this.value}"></div>
            <div class="grid-2" style="margin-top:14px">
              <div><label style="font-size:11px;font-weight:700;color:${C.mut};text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:5px">City</label><input type="text" value="${addr.city}"></div>
              <div><label style="font-size:11px;font-weight:700;color:${C.mut};text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:5px">ZIP</label><input type="text" value="${addr.zip}"></div>
            </div>
            <button class="btn btn-primary" onclick="state.checkoutStep=2;render()" style="width:100%;border-radius:12px;padding:13px;font-size:14px;margin-top:20px">Continue to Delivery →</button>
          </div>`:''}
          ${step===2?`<div class="card" style="padding:26px">
            <div style="font-size:17px;font-weight:800;color:${C.txt};margin-bottom:22px">🚚 Delivery Options</div>
            <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:20px">
              ${[['standard','Standard','35-50 min','$3.99'],['priority','Priority','20-30 min','$5.99'],['express','Express ⚡','10-20 min','$8.99']].map(([v,l,t,p])=>`
              <button onclick="state.delivery='${v}';render()" style="display:flex;align-items:center;padding:16px;background:${(state.delivery||'standard')===v?C.accDim:C.bgCard};border:2px solid ${(state.delivery||'standard')===v?C.acc:C.brd};border-radius:13px;cursor:pointer;transition:all .2s;text-align:left">
                <div style="flex:1"><div style="font-size:14px;font-weight:700;color:${(state.delivery||'standard')===v?C.acc:C.txt}">${l}</div><div style="font-size:12px;color:${C.mut};margin-top:2px">⏱ ${t}</div></div>
                <div style="font-size:15px;font-weight:800;color:${(state.delivery||'standard')===v?C.acc:C.txt}">${p}</div>
                <div style="width:20px;height:20px;border-radius:50%;border:2px solid ${(state.delivery||'standard')===v?C.acc:C.brd};margin-left:12px;display:flex;align-items:center;justify-content:center">${(state.delivery||'standard')===v?`<div style="width:9px;height:9px;border-radius:50%;background:${C.acc}"></div>`:''}</div>
              </button>`).join('')}
            </div>
            <div style="padding:13px;background:${C.accDim};border-radius:10px;font-size:13px;color:${C.mut};margin-bottom:18px">📍 Delivering to <strong style="color:${C.txt}">${addr.line1}, ${addr.city}</strong></div>
            <div style="display:flex;gap:10px">
              <button class="btn btn-sec" onclick="state.checkoutStep=1;render()" style="flex:1;border-radius:12px">← Back</button>
              <button class="btn btn-primary" onclick="state.checkoutStep=3;render()" style="flex:2;border-radius:12px;padding:12px">Continue to Payment →</button>
            </div>
          </div>`:''}
          ${step===3?`<div class="card" style="padding:26px">
            <div style="font-size:17px;font-weight:800;color:${C.txt};margin-bottom:22px">💳 Payment Method</div>
            <div style="display:flex;gap:8px;margin-bottom:20px">
              ${[['card','💳 Card'],['paypal','PayPal'],['apple','Apple Pay']].map(([v,l])=>`<button onclick="state.payMethod='${v}';render()" style="flex:1;padding:11px 8px;background:${(state.payMethod||'card')===v?C.accDim:C.bgCard};border:2px solid ${(state.payMethod||'card')===v?C.acc:C.brd};border-radius:11px;color:${(state.payMethod||'card')===v?C.acc:C.mut};font-size:13px;font-weight:600;cursor:pointer;transition:all .15s">${l}</button>`).join('')}
            </div>
            ${(state.payMethod||'card')==='card'?`<div>
              <label style="font-size:11px;font-weight:700;color:${C.mut};text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:5px">Card Number</label>
              <input type="text" value="4242 4242 4242 4242" style="margin-bottom:14px">
              <div class="grid-2" style="gap:14px">
                <div><label style="font-size:11px;font-weight:700;color:${C.mut};text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:5px">Expiry</label><input type="text" value="12/26"></div>
                <div><label style="font-size:11px;font-weight:700;color:${C.mut};text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:5px">CVC</label><input type="text" value="123"></div>
              </div>
              <div style="font-size:12px;color:${C.mut};margin-top:12px;margin-bottom:16px">🔒 Test mode active · No real charges</div>
            </div>`:`<div style="padding:36px 20px;text-align:center;font-size:14px;color:${C.mut};margin-bottom:16px"><div style="font-size:40px;margin-bottom:12px">${(state.payMethod||'card')==='paypal'?'🅿️':'🍎'}</div>${(state.payMethod||'card')==='paypal'?"You'll be redirected to PayPal":'Authenticate with Touch ID / Face ID'}</div>`}
            <div style="display:flex;gap:10px">
              <button class="btn btn-sec" onclick="state.checkoutStep=2;render()" style="flex:1;border-radius:12px">← Back</button>
              <button class="btn btn-primary" onclick="placeOrder()" id="place-btn" style="flex:2;border-radius:12px;padding:12px;font-size:14px">🎉 Place Order — $${final.toFixed(2)}</button>
            </div>
          </div>`:''}
        </div>
        <!-- Summary -->
        <div class="card" style="padding:18px;position:sticky;top:68px">
          <div style="font-size:14px;font-weight:800;color:${C.txt};margin-bottom:14px">Summary</div>
          ${state.cart.map(i=>`<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:8px"><span style="color:${C.mut}">${i.name} ×${i.qty}</span><span style="color:${C.txt};font-weight:600">$${(i.price*i.qty).toFixed(2)}</span></div>`).join('')}
          <div class="divider"></div>
          ${[['Subtotal',`$${cartTotal().toFixed(2)}`],['Delivery',`$${delFee.toFixed(2)}`],['Tax',`$${tax.toFixed(2)}`]].map(([l,v])=>`<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:8px"><span style="color:${C.mut}">${l}</span><span style="color:${C.txt};font-weight:600">${v}</span></div>`).join('')}
          <div class="divider"></div>
          <div style="display:flex;justify-content:space-between">
            <span style="font-size:14px;font-weight:800;color:${C.txt}">Total</span>
            <span style="font-size:17px;font-weight:900;color:${C.acc}">$${final.toFixed(2)}</span>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

function renderTracking(){
  const elapsed=state.trackElapsed||0;
  const steps=[
    {label:'Order Confirmed',desc:'Your order has been received',icon:'✅',done:true},
    {label:'Preparing',desc:'The kitchen is crafting your meal',icon:'👨‍🍳',done:true},
    {label:'Out for Delivery',desc:'Your rider is on the way',icon:'🛵',done:elapsed>8},
    {label:'Delivered',desc:'Enjoy your meal!',icon:'🎉',done:elapsed>20},
  ];
  const cur=steps.filter(s=>s.done).length-1;
  const eta=Math.max(0,25-Math.floor(elapsed/2));
  const order=state.orderPlaced||state.orders[0];

  return `<div style="padding-top:68px;padding-bottom:64px">
    <div style="max-width:660px;margin:0 auto;padding:0 20px">
      <h1 style="font-size:26px;font-weight:900;color:${C.txt};letter-spacing:-.03em;margin-bottom:6px">Live Order Tracking</h1>
      ${order?`<div style="font-size:13px;color:${C.mut};margin-bottom:28px">${order.id}</div>`:''}
      <!-- ETA Card -->
      <div class="card" style="padding:26px;margin-bottom:20px;text-align:center;background:linear-gradient(135deg,${C.accDim} 0%,${C.bgCard} 100%)">
        <div style="font-size:52px;margin-bottom:8px">${steps[cur]?.icon||'🛵'}</div>
        <div style="font-size:20px;font-weight:900;color:${C.txt};margin-bottom:5px">${steps[cur]?.label||'Processing'}</div>
        <div style="font-size:14px;color:${C.mut};margin-bottom:18px">${steps[cur]?.desc||''}</div>
        ${eta>0?`<div style="display:inline-flex;align-items:center;gap:8px;background:${C.acc};padding:10px 22px;border-radius:50px;color:#fff;font-weight:700;font-size:15px">⏱ Arriving in ~${eta} min</div>`:
        `<div style="display:inline-flex;align-items:center;gap:8px;background:${C.ok};padding:10px 22px;border-radius:50px;color:#fff;font-weight:700;font-size:15px">✅ Order Delivered!</div>`}
      </div>
      <!-- Timeline -->
      <div class="card" style="padding:24px;margin-bottom:18px">
        <div style="font-size:15px;font-weight:800;color:${C.txt};margin-bottom:22px">Delivery Timeline</div>
        ${steps.map((s,i)=>`<div style="display:flex;gap:14px;${i<steps.length-1?'':''}">
          <div style="display:flex;flex-direction:column;align-items:center">
            <div style="width:38px;height:38px;border-radius:50%;background:${s.done?C.ok+'22':C.bgIn};border:2px solid ${s.done?C.ok:C.brd};display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:all .5s">${s.done?`<span style="color:${C.ok}">✓</span>`:`<span style="color:${C.sub}">${s.icon}</span>`}</div>
            ${i<steps.length-1?`<div style="width:2px;flex:1;min-height:24px;background:${steps[i+1]?.done?C.ok:C.brd};margin:3px 0;transition:background .5s"></div>`:''}
          </div>
          <div style="padding-bottom:${i<steps.length-1?'24px':'0'}">
            <div style="font-size:14px;font-weight:${s.done?'700':'500'};color:${s.done?C.txt:C.mut};margin-top:8px">${s.label}</div>
            <div style="font-size:12px;color:${C.mut};margin-top:2px">${s.desc}</div>
          </div>
        </div>`).join('')}
      </div>
      <!-- Map -->
      <div class="card" style="padding:0;overflow:hidden;margin-bottom:18px;height:180px;position:relative">
        <div style="position:absolute;inset:0;background:linear-gradient(135deg,${C.bgIn} 0%,${C.bgCard} 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px">
          <div style="font-size:40px">🗺️</div>
          <div style="font-size:13px;color:${C.mut};font-weight:500">Live Map · Real-time GPS Tracking</div>
          <div style="padding:6px 14px;background:${C.accDim};border-radius:20px;font-size:12px;color:${C.acc};font-weight:700">🛵 Marco · 2.4 km away · ${eta>0?'~'+eta+' min':'Arrived'}</div>
        </div>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-ghost" style="flex:1;border-radius:12px">📞 Call Rider</button>
        <button class="btn btn-ghost" style="flex:1;border-radius:12px">💬 Chat Support</button>
      </div>
    </div>
  </div>`;
}

      ${tab==='orders'?`<div style="display:flex;flex-direction:column;gap:10px">
        ${state.orders.map(o=>`<div class="card" style="padding:16px">
          <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
            <div style="min-width:110px"><div style="font-size:13px;font-weight:700;color:${C.txt}">${o.id}</div><div style="font-size:11px;color:${C.mut}">${o.date}</div></div>

      ${tab==='menu'?`<div>
        <div style="display:flex;justify-content:flex-end;margin-bottom:14px"><button class="btn btn-primary" onclick="showToast('Add item form would open')" style="font-size:13px;padding:9px 18px;border-radius:9px">+ Add Item</button></div>

// ═══════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════
function toggleTheme(){isDark=!isDark;C=isDark?DARK:LIGHT;themeCSS();render();}
function toggleTop(t){
  state.selTops=state.selTops||[];
  const idx=state.selTops.indexOf(t);
  if(idx>=0)state.selTops.splice(idx,1);else state.selTops.push(t);
}
function updateQty(idx,delta){
  state.cart[idx].qty+=delta;
  if(state.cart[idx].qty<=0)state.cart.splice(idx,1);
  render();
}
function applyCoupon(){
  const code=(state.cartCoupon||'').toUpperCase();
  if(COUPONS[code]){state.coupon={code,pct:COUPONS[code]};showToast(`${COUPONS[code]}% discount applied! 🎉`);}
  else showToast('Invalid coupon code','err');
}
function addCartFromProduct(){
  const item=state.selItem;
  if(!item)return;
  addToCart(item,{size:state.selSize||item.sizes?.[0],tops:state.selTops||[],qty:state.selQty||1});
  state.selTops=[];state.selQty=1;render();
}
function addToCartFromProduct(){
  const item=state.selItem;if(!item)return;
  const selTops=state.selTops||[];
  const topPrice=selTops.reduce((s,t)=>s+parseFloat(t.split('+')[1]||0),0);
  const qty=state.selQty||1;
  for(let i=0;i<qty;i++)addToCart(item,{size:state.selSize||item.sizes?.[0],tops:selTops,price:item.price+topPrice});
  state.selTops=[];state.selQty=1;render();
}
function placeOrder(){
  const btn=$('#place-btn');if(btn){btn.textContent='⏳ Placing Order...';btn.disabled=true;}
  setTimeout(()=>{
    const id=`ORD-2024-${Math.floor(9000+Math.random()*999)}`;
    const delFee=state.delivery==='express'?8.99:state.delivery==='priority'?5.99:3.99;
    const tax=cartTotal()*0.08;
    const total=cartTotal()+delFee+tax;
    const newOrder={id,date:new Date().toISOString().split('T')[0],items:state.cart.map(i=>({name:i.name,qty:i.qty})),total,status:'confirmed',rating:null};
    state.orders.unshift(newOrder);state.orderPlaced=newOrder;state.cart=[];state.checkoutStep=1;
    startTrackingTimer();navigate('tracking');showToast('Order placed! 🎉');
  },1800);
}
function startTrackingTimer(){
  state.trackElapsed=0;
  if(state.trackTimer)clearInterval(state.trackTimer);
  state.trackTimer=setInterval(()=>{state.trackElapsed=(state.trackElapsed||0)+1;if(state.page==='tracking'){const el=$('#track-elapsed');if(el)el.textContent=state.trackElapsed;}updateTrackingDisplay();},1000);
}
function updateTrackingDisplay(){
  if(state.page!=='tracking')return;
  const elapsed=state.trackElapsed||0;
  const eta=Math.max(0,25-Math.floor(elapsed/2));
  const etaEl=$('#eta-display');if(etaEl)etaEl.textContent=eta>0?`⏱ Arriving in ~${eta} min`:'✅ Order Delivered!';
  if(elapsed===8||elapsed===20)render();
}
function updateOrderStatus(id,status){
  const o=state.orders.find(o=>o.id===id);if(o){o.status=status;showToast(`Order ${id} → ${status}`);}
}
function deleteMenuItem(id){
  state.adminMenuItems=state.adminMenuItems.filter(i=>i.id!==id);
  showToast('Item removed','err');render();
}
function addReorder(items){}

// RENDER ENGINE
// ═══════════════════════════════════════════════
function renderPage(){
  switch(state.page){
    case 'home':return renderHome();
    case 'menu':return renderMenu();
    case 'product':return renderProduct();
    case 'cart':return renderCart();
    case 'checkout':return renderCheckout();
    case 'tracking':return renderTracking();
    case 'auth':return renderAuth();
    case 'dashboard':return renderDashboard();
    case 'admin':return renderAdmin();
    default:return renderHome();
  }
}

function render(){
  const app=$('#app');
  app.innerHTML=`
    ${renderNavbar()}
    <div id="toast" style="display:none;position:fixed;top:66px;right:16px;z-index:999;background:${C.bgCard};border:1px solid ${C.ok};border-radius:12px;padding:12px 18px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 30px rgba(0,0,0,.3);animation:slideIn .3s ease;font-size:14px;font-weight:500;color:${C.txt}"></div>
    <main style="animation:fadeUp .25s ease">${renderPage()}</main>
    ${renderFooter()}
    <!-- FAB -->
    <div style="position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:7px;z-index:50">
      <button class="icon-btn" onclick="navigate('auth')" title="Auth" style="box-shadow:0 4px 16px rgba(0,0,0,.25)">🔑</button>
    </div>
  `;
  // Restore toast if visible
  if(state.toast&&state.toastTimer){const t=$('#toast');if(t){t.innerHTML=`<span>${state.toast.type==='ok'?'✅':'❌'}</span><span>${state.toast.msg}</span>`;t.style.display='flex';}}
}

themeCSS();
render();
